
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Traductor AR PRO Mundial 2026</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    text-align:center;
}

header{
    background:#111;
    padding:12px;
}

h1{
    margin:0;
    font-size:24px;
}

h2{
    margin:4px;
    color:#aaa;
    font-size:13px;
}

/* BOTONES */
button{
    margin:6px;
    padding:12px 16px;
    font-size:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#startBtn{
    background:#22c55e;
    color:white;
}

/* SUBTÍTULO (50% reducido) */
#subtitle{
    font-size:12px;
    line-height:1.4;
    padding:18px;
    min-height:120px;
    color:#fff;
}

/* CAJA INFERIOR */
#translatedBox{
    margin-top:10px;
    padding:15px;
    border-top:1px solid #333;
    font-size:16px;
    min-height:60px;
    color:#f1f1f1;
}

/* STATUS */
#status{
    color:#22c55e;
    margin-top:5px;
    font-size:13px;
}

/* HISTORIAL */
#history{
    text-align:left;
    padding:10px;
    border-top:1px solid #333;
    max-height:120px;
    overflow:auto;
    font-size:12px;
    color:#ccc;
}

.item{margin-bottom:5px;}
</style>
</head>

<body>

<header>
<h1>TV Traductor AR</h1>
<h2>Mundial 2026 - Tecnosoft Argentina</h2>
</header>

<button id="startBtn" onclick="toggleRecognition()">🎤 Iniciar / Detener</button>

<div id="status">Listo para entrevistas</div>

<div id="subtitle">Esperando audio...</div>

<div id="translatedBox"></div>

<div>
<button onclick="copyTrans()">📋 Copiar</button>
<button onclick="clearTrans()">🗑 Borrar</button>
<button onclick="continuar()">▶ Continuar</button>
</div>

<div id="history"></div>

<script>

let recognition;
let running = false;

// ON / OFF
function toggleRecognition(){
    if(running){
        stopRecognition();
    }else{
        startRecognition();
    }
}

// iniciar
function startRecognition(){

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

    recognition = new SR();

    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onstart = () => {
        running = true;
        document.getElementById("status").innerText = "🎧 Escuchando en vivo...";
        document.getElementById("startBtn").innerText = "⏹ Detener";
    };

    recognition.onresult = async (e) => {

        let text = e.results[e.results.length - 1][0].transcript;

        let lang = detectLang(text);

        let translated = await translate(text, lang);

        document.getElementById("subtitle").innerText = translated;
        document.getElementById("translatedBox").innerText = translated;

        addHistory(translated);
    };

    recognition.onerror = () => restart();

    recognition.onend = () => {
        if(running) restart();
    };

    recognition.start();
}

// detener
function stopRecognition(){
    running = false;

    document.getElementById("status").innerText = "⏸ Detenido";
    document.getElementById("startBtn").innerText = "🎤 Iniciar";

    try{
        recognition.stop();
    }catch(e){}
}

// reinicio automático
function restart(){
    setTimeout(() => {
        if(running){
            try{ recognition.start(); }catch(e){}
        }
    },400);
}

// detección idioma simple
function detectLang(text){

    text = text.toLowerCase();

    const pt = ["você","não","está","agora","muito"];

    for(let w of pt){
        if(text.includes(w)) return "pt";
    }

    return "en";
}

// traducción
async function translate(text, lang){

    if(lang === "es") return text;

    try{

        let res = await fetch(
            "https://api.mymemory.translated.net/get?q="
            + encodeURIComponent(text)
            + "&langpair=" + lang + "|es"
        );

        let data = await res.json();

        return data.responseData.translatedText;

    }catch(e){
        return text;
    }
}

// copiar
function copyTrans(){

    navigator.clipboard.writeText(
        document.getElementById("translatedBox").innerText
    );

    alert("Copiado");
}

// borrar
function clearTrans(){

    document.getElementById("subtitle").innerText = "Esperando audio...";
    document.getElementById("translatedBox").innerText = "";
    document.getElementById("history").innerHTML = "";
}

// continuar
function continuar(){

    try{
        if(recognition){
            recognition.start();
        }
    }catch(e){}
}

// historial
function addHistory(text){

    let div = document.createElement("div");
    div.className = "item";
    div.innerText = text;

    let history = document.getElementById("history");

    history.prepend(div);

    if(history.children.length > 10){
        history.removeChild(history.lastChild);
    }
}

</script>

</body>
</html>
