
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Traductor AR</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  text-align: center;
}

header {
  padding: 20px;
  background: #111827;
}

h1 { margin: 0; }
h2 { margin: 5px; font-size: 14px; color: #9ca3af; }

#status {
  margin-top: 20px;
  font-size: 18px;
  color: #22c55e;
}

#output {
  margin-top: 30px;
  font-size: 26px;
  padding: 20px;
}

button {
  margin-top: 20px;
  padding: 15px 25px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #22c55e;
  color: white;
}
</style>

</head>

<body>

<header>
<h1>TV Traductor AR</h1>
<h2>Tecnosoft Argentina</h2>
</header>

<button onclick="startContinuous()">🎤 Iniciar modo continuo</button>

<div id="status">Esperando inicio...</div>
<div id="output">---</div>

<script>

let recognition;
let isRunning = false;

// iniciar modo continuo
function startContinuous() {

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Tu navegador no soporta reconocimiento de voz");
    return;
  }

  recognition = new SpeechRecognition();

  recognition.continuous = true;   // 🔴 clave modo continuo
  recognition.interimResults = false;

  recognition.onstart = () => {
    isRunning = true;
    document.getElementById("status").innerText = "🎧 Escuchando continuamente...";
  };

  recognition.onresult = async (event) => {

    let text = event.results[event.results.length - 1][0].transcript;

    document.getElementById("output").innerText = "Detectado: " + text;

    let lang = detectLanguage(text);

    let translated = await translateText(text, lang);

    document.getElementById("output").innerText = "Traducción: " + translated;

    speak(translated);
  };

  recognition.onerror = () => {
    document.getElementById("status").innerText = "⚠️ Error, reiniciando...";
    restart();
  };

  recognition.onend = () => {
    if (isRunning) {
      restart(); // 🔁 reinicio automático
    }
  };

  recognition.start();
}

// reinicio automático
function restart() {
  setTimeout(() => {
    if (recognition && isRunning) recognition.start();
  }, 500);
}

// detectar idioma simple
function detectLanguage(text) {

  const portugueseWords = ["você", "não", "está", "bom", "agora"];
  const lower = text.toLowerCase();

  for (let w of portugueseWords) {
    if (lower.includes(w)) return "pt";
  }

  return "en";
}

// traducir
async function translateText(text, lang) {

  let target = "es";

  let res = await fetch(
    "https://api.mymemory.translated.net/get?q="
    + encodeURIComponent(text)
    + "&langpair=" + lang + "|" + target
  );

  let data = await res.json();
  return data.responseData.translatedText;
}

// hablar
function speak(text) {
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "es-ES";
  window.speechSynthesis.speak(msg);
}

</script>

</body>
</html>
