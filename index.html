
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Traductor AR Mundial 2026</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
    text-align:center;
}

header{
    background:#111;
    padding:15px;
}

h1{
    margin:0;
    font-size:28px;
}

h2{
    margin:5px 0 0 0;
    color:#aaa;
    font-size:16px;
}

button{
    margin:15px;
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#startBtn{
    background:#22c55e;
    color:white;
}

#status{
    color:#22c55e;
    margin-bottom:10px;
}

#subtitle{
    font-size:36px;
    line-height:1.4;
    padding:20px;
    min-height:180px;
}

#history{
    text-align:left;
    padding:15px;
    border-top:1px solid #333;
    max-height:250px;
    overflow:auto;
}

.item{
    margin-bottom:10px;
    color:#ddd;
}
</style>
</head>

<body>

<header>
<h1>TV Traductor AR Mundial 2026</h1>
<h2>Tecnosoft Argentina</h2>
</header>

<button id="startBtn" onclick="startRecognition()">
🎤 Iniciar Traducción
</button>

<div id="status">Esperando inicio...</div>

<div id="subtitle">
Los subtítulos aparecerán aquí...
</div>

<div id="history"></div>

<script>

let recognition;
let running = false;

async function translateText(text){

    try{

        const response = await fetch(
            "https://api.mymemory.translated.net/get?q=" +
            encodeURIComponent(text) +
            "&langpair=en|es"
        );

        const data = await response.json();

        return data.responseData.translatedText;

    }catch(error){

        return text;
    }
}

function addHistory(text){

    const history = document.getElementById("history");

    const item = document.createElement("div");

    item.className = "item";

    item.innerText = text;

    history.prepend(item);
}

function startRecognition(){

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition){

        alert("Tu navegador no soporta reconocimiento de voz.");
        return;
    }

    recognition = new SpeechRecognition();

    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = "en-US";

    recognition.onstart = function(){

        running = true;

        document.getElementById("status").innerText =
            "🎧 Escuchando entrevista...";
    };

    recognition.onresult = async function(event){

        let original =
            event.results[event.results.length - 1][0].transcript;

        let translated =
            await translateText(original);

        document.getElementById("subtitle").innerText =
            translated;

        addHistory(translated);
    };

    recognition.onerror = function(){

        restartRecognition();
    };

    recognition.onend = function(){

        if(running){

            restartRecognition();
        }
    };

    recognition.start();
}

function restartRecognition(){

    setTimeout(() => {

        try{

            recognition.start();

        }catch(e){}
    },500);
}

</script>

</body>
</html>
